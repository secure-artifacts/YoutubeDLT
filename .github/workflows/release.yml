name: Build YoutubeDLT (Nuitka)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

############################
# Windows
############################

  windows:

    runs-on: windows-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install nuitka
        pip install imageio

    - name: Build Windows
      run: |
        python -m nuitka main.py ^
          --standalone ^
          --enable-plugin=pyqt6 ^
          --windows-disable-console ^
          --output-dir=build ^
          --output-filename=YoutubeDLT.exe

    - name: Package
      run: |
        mkdir release
        move build\main.dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: windows
        files: release/YoutubeDLT-Windows.exe
        overwrite_files: true

############################
# macOS ARM
############################

  mac-arm:

    runs-on: macos-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        brew install create-dmg
        pip install -r requirements.txt
        pip install nuitka

    - name: Build ARM
      run: |
        python -m nuitka main.py \
          --standalone \
          --enable-plugin=pyqt6 \
          --macos-create-app-bundle \
          --macos-app-name=YoutubeDLT \
          --output-dir=build

    - name: Create DMG
      run: |
        create-dmg \
          --volname "YoutubeDLT" \
          --window-size 600 300 \
          --icon-size 100 \
          --app-drop-link 450 150 \
          YoutubeDLT-macOS-arm64.dmg \
          build/main.app

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: mac-arm
        files: YoutubeDLT-macOS-arm64.dmg
        overwrite_files: true

############################
# macOS Intel
############################

  mac-intel:

    runs-on: macos-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        brew install create-dmg
        pip install -r requirements.txt
        pip install nuitka

    - name: Build Intel
      run: |
        python -m nuitka main.py \
          --standalone \
          --enable-plugin=pyqt6 \
          --macos-create-app-bundle \
          --macos-app-name=YoutubeDLT \
          --output-dir=build

    - name: Create DMG
      run: |
        create-dmg \
          --volname "YoutubeDLT" \
          --window-size 600 300 \
          --icon-size 100 \
          --app-drop-link 450 150 \
          YoutubeDLT-macOS-x86_64.dmg \
          build/main.app

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: mac-intel
        files: YoutubeDLT-macOS-x86_64.dmg
        overwrite_files: true
