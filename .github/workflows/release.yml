name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

################################
# Create Release
################################

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true

################################
# Windows Build
################################

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Build Windows
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
          --name YoutubeDLT `
          --icon app_icon.ico `
          --hidden-import yt_dlp `
          --hidden-import PyQt6.QtWidgets `
          --hidden-import PyQt6.QtCore `
          --hidden-import PyQt6.QtGui `
          --hidden-import certifi `
          main.py

          mkdir release
          move dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe

      - name: Upload Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-Windows.exe

################################
# macOS Build
################################

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:

      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build macOS
        run: |
          pyinstaller \
          --noconfirm \
          --clean \
          --windowed \
          --target-architecture ${{ matrix.arch }} \
          --name YoutubeDLT \
          --hidden-import yt_dlp \
          --hidden-import PyQt6.QtWidgets \
          --hidden-import PyQt6.QtCore \
          --hidden-import PyQt6.QtGui \
          --hidden-import certifi \
          main.py

      - name: Fix macOS Security
        run: |
          APP="dist/YoutubeDLT.app"

          xattr -cr "$APP"
          codesign --deep --force --sign - "$APP"

      - name: Package
        run: |
          mkdir release
          mv dist/YoutubeDLT.app release/

          cd release
          zip -r YoutubeDLT-macOS-${{ matrix.arch }}.zip YoutubeDLT.app

################################
# Delete existing asset
################################

      - name: Delete old asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset ${{ github.ref_name }} YoutubeDLT-macOS-${{ matrix.arch }}.zip --yes || true

################################
# Upload
################################

      - name: Upload macOS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-macOS-${{ matrix.arch }}.zip
