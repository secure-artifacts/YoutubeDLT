```yaml
name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  create-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true


  build-windows:
    needs: create-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Build EXE
        shell: powershell
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name YoutubeDLT `
            --icon app_icon.ico `
            --hidden-import yt_dlp `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import certifi `
            main.py

          move dist\YoutubeDLT.exe YoutubeDLT-Windows.exe

      - name: Upload Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: YoutubeDLT-Windows.exe


  build-macos:
    needs: create-release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          brew install ffmpeg create-dmg

      - name: Build arm64
        run: |
          arch -arm64 pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            main.py

          mv dist/YoutubeDLT.app YoutubeDLT-arm64.app

      - name: Build x86_64
        run: |
          arch -x86_64 pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            main.py

          mv dist/YoutubeDLT.app YoutubeDLT-x86_64.app

      - name: Create Universal Binary
        run: |
          cp -R YoutubeDLT-arm64.app YoutubeDLT.app

          rm YoutubeDLT.app/Contents/MacOS/YoutubeDLT

          lipo -create \
            YoutubeDLT-arm64.app/Contents/MacOS/YoutubeDLT \
            YoutubeDLT-x86_64.app/Contents/MacOS/YoutubeDLT \
            -output YoutubeDLT.app/Contents/MacOS/YoutubeDLT

      - name: Build DMG
        run: |
          mkdir dmg
          mv YoutubeDLT.app dmg/

          create-dmg \
            --volname "YoutubeDLT Installer" \
            --window-size 600 300 \
            --icon-size 100 \
            --icon YoutubeDLT.app 175 120 \
            --app-drop-link 425 120 \
            YoutubeDLT-macOS.dmg \
            dmg/

      - name: Upload macOS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: YoutubeDLT-macOS.dmg
```
