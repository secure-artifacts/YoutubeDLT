name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

################################
# Create Release
################################

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true

################################
# Windows Build
################################

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Build Windows
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
          --name YoutubeDLT `
          --icon app_icon.ico `
          --hidden-import yt_dlp `
          --hidden-import PyQt6.QtWidgets `
          --hidden-import PyQt6.QtCore `
          --hidden-import PyQt6.QtGui `
          --hidden-import certifi `
          main.py

          mkdir release
          move dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe

      - name: Upload Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-Windows.exe

################################
# macOS Build
################################

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:

      - uses: actions/checkout@v5

################################
# Install ARM dependencies
################################

      - name: Setup Python ARM
        if: matrix.arch == 'arm64'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies ARM
        if: matrix.arch == 'arm64'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

################################
# Install Intel dependencies
################################

      - name: Setup Python Intel
        if: matrix.arch == 'x86_64'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install dependencies Intel
        if: matrix.arch == 'x86_64'
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 pip install -r requirements.txt
          arch -x86_64 pip install pyinstaller

################################
# Install ffmpeg
################################

      - name: Install ffmpeg
        run: brew install ffmpeg

################################
# Build ARM
################################

      - name: Build macOS ARM
        if: matrix.arch == 'arm64'
        run: |
          pyinstaller \
          --noconfirm \
          --clean \
          --windowed \
          --name YoutubeDLT \
          --hidden-import yt_dlp \
          --hidden-import PyQt6.QtWidgets \
          --hidden-import PyQt6.QtCore \
          --hidden-import PyQt6.QtGui \
          --hidden-import certifi \
          main.py

################################
# Build Intel
################################

      - name: Build macOS Intel
        if: matrix.arch == 'x86_64'
        run: |
          arch -x86_64 pyinstaller \
          --noconfirm \
          --clean \
          --windowed \
          --name YoutubeDLT \
          --hidden-import yt_dlp \
          --hidden-import PyQt6.QtWidgets \
          --hidden-import PyQt6.QtCore \
          --hidden-import PyQt6.QtGui \
          --hidden-import certifi \
          main.py

################################
# Fix macOS security
################################

      - name: Fix macOS Security
        run: |
          APP="dist/YoutubeDLT.app"

          xattr -cr "$APP"

          codesign --deep --force --sign - "$APP"

################################
# Package
################################

      - name: Package
        run: |
          mkdir release
          mv dist/YoutubeDLT.app release/

          cd release
          zip -r YoutubeDLT-macOS-${{ matrix.arch }}.zip YoutubeDLT.app

################################
# Upload
################################

      - name: Upload macOS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-macOS-${{ matrix.arch }}.zip
