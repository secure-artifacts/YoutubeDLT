name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v5

################################
# Python
################################

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

################################
# Dependencies
################################

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

################################
# ffmpeg
################################

    - name: Install ffmpeg (Windows)
      if: matrix.os == 'windows-latest'
      run: choco install ffmpeg -y

    - name: Install ffmpeg (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install ffmpeg

################################
# Build Windows
################################

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        pyinstaller --noconfirm --clean --onefile --windowed `
        --name YoutubeDLT `
        --icon app_icon.ico `
        --collect-all PyQt6 `
        --hidden-import yt_dlp `
        --hidden-import certifi `
        main.py

################################
# Build macOS Universal
################################

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller \
        --noconfirm \
        --clean \
        --windowed \
        --target-arch universal2 \
        --name YoutubeDLT \
        --collect-all PyQt6 \
        --hidden-import yt_dlp \
        --hidden-import certifi \
        main.py

################################
# Fix macOS Security
################################

    - name: Fix macOS security
      if: matrix.os == 'macos-latest'
      run: |
        xattr -cr dist/YoutubeDLT.app
        codesign --deep --force --sign - dist/YoutubeDLT.app

################################
# Create DMG
################################

    - name: Install create-dmg
      if: matrix.os == 'macos-latest'
      run: brew install create-dmg

    - name: Create DMG
      if: matrix.os == 'macos-latest'
      run: |
        mkdir dmg
        mv dist/YoutubeDLT.app dmg/

        create-dmg \
        --volname "YoutubeDLT" \
        --window-pos 200 120 \
        --window-size 800 400 \
        --icon-size 100 \
        --icon "YoutubeDLT.app" 200 190 \
        --hide-extension "YoutubeDLT.app" \
        --app-drop-link 600 185 \
        YoutubeDLT-macOS.dmg \
        dmg

################################
# Package Windows
################################

    - name: Package Windows
      if: matrix.os == 'windows-latest'
      run: |
        mkdir release
        move dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe

################################
# Create Release
################################

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          release/YoutubeDLT-Windows.exe
          YoutubeDLT-macOS.dmg
