name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-13          # Intel runner → builds x86_64
            name: macOS-Intel
            arch: x86_64
          - os: macos-14          # Apple Silicon runner → builds arm64
            name: macOS-AppleSilicon
            arch: arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg Windows
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Install ffmpeg macOS
        if: startsWith(matrix.os, 'macos-')
        run: brew install ffmpeg

      # ─── Windows Build ───────────────────────────────────────
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name YoutubeDLT `
            --icon app_icon.ico `
            --hidden-import yt_dlp `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import certifi `
            main.py

          mkdir release
          Move-Item -Path dist\YoutubeDLT.exe -Destination release\YoutubeDLT-Windows.exe

      # ─── macOS Builds (Intel + Apple Silicon) ────────────────
      - name: Build macOS (${{ matrix.name }})
        if: startsWith(matrix.os, 'macos-')
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            --target-arch ${{ matrix.arch }} \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import certifi \
            main.py

          mkdir release
          mv dist/YoutubeDLT.app release/

          cd release
          zip -r YoutubeDLT-${{ matrix.name }}.zip YoutubeDLT.app

      # ─── Upload artifacts to Release ─────────────────────────
      - name: Upload Windows
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-Windows.exe

      - name: Upload macOS Intel
        if: matrix.name == 'macOS-Intel'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-macOS-Intel.zip

      - name: Upload macOS Apple Silicon
        if: matrix.name == 'macOS-AppleSilicon'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-macOS-AppleSilicon.zip
