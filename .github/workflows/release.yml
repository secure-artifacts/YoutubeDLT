name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

################################
# Create Release
################################

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true

################################
# Windows Build
################################

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Build Windows
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
          --name YoutubeDLT `
          --icon app_icon.ico `
          --collect-all PyQt6 `
          --hidden-import yt_dlp `
          --hidden-import certifi `
          main.py

          mkdir release
          move dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe

      - name: Upload Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-Windows.exe

################################
# macOS Universal Build
################################

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v5

################################
# Install Python
################################

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

################################
# Install dependencies
################################

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

################################
# Install ffmpeg
################################

      - name: Install ffmpeg
        run: brew install ffmpeg

################################
# Build App
################################

      - name: Build macOS App
        run: |
          pyinstaller \
          --noconfirm \
          --clean \
          --windowed \
          --name YoutubeDLT \
          --collect-all PyQt6 \
          --hidden-import yt_dlp \
          --hidden-import certifi \
          main.py

################################
# Fix macOS Security
################################

      - name: Fix macOS Security
        run: |
          APP="dist/YoutubeDLT.app"

          xattr -cr "$APP"

          codesign --deep --force --sign - "$APP"

################################
# Install DMG Creator
################################

      - name: Install create-dmg
        run: brew install create-dmg

################################
# Create DMG
################################

      - name: Create DMG
        run: |
          mkdir dmg
          mv dist/YoutubeDLT.app dmg/

          create-dmg \
          --volname "YoutubeDLT" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "YoutubeDLT.app" 200 190 \
          --hide-extension "YoutubeDLT.app" \
          --app-drop-link 600 185 \
          "YoutubeDLT-macOS.dmg" \
          "dmg"

################################
# Upload macOS
################################

      - name: Upload macOS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: YoutubeDLT-macOS.dmg
