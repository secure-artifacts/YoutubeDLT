name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true


  build-macos-arm64:

    needs: create-release
    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          brew install ffmpeg

      - name: Build arm64
        run: |

          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import certifi \
            main.py

          mv dist/YoutubeDLT.app YoutubeDLT-arm64.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: YoutubeDLT-arm64.app


  build-macos-x86:

    needs: create-release
    runs-on: macos-13

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          brew install ffmpeg

      - name: Build x86_64
        run: |

          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import certifi \
            main.py

          mv dist/YoutubeDLT.app YoutubeDLT-x86_64.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86
          path: YoutubeDLT-x86_64.app


  merge-universal:

    needs:
      - build-macos-arm64
      - build-macos-x86

    runs-on: macos-latest

    permissions:
      contents: write

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: arm

      - uses: actions/download-artifact@v4
        with:
          name: macos-x86
          path: x86

      - name: Create Universal Binary
        run: |

          cp -R arm/YoutubeDLT-arm64.app YoutubeDLT.app

          ARM_BIN=arm/YoutubeDLT-arm64.app/Contents/MacOS/YoutubeDLT
          X86_BIN=x86/YoutubeDLT-x86_64.app/Contents/MacOS/YoutubeDLT
          UNI_BIN=YoutubeDLT.app/Contents/MacOS/YoutubeDLT

          rm $UNI_BIN

          lipo -create \
            $ARM_BIN \
            $X86_BIN \
            -output $UNI_BIN

      - name: Zip universal app
        run: |
          zip -r YoutubeDLT-macOS-universal.zip YoutubeDLT.app

      - name: Upload macOS Universal
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: YoutubeDLT-macOS-universal.zip


  build-windows:

    needs: create-release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Build Windows
        shell: powershell
        run: |

          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name YoutubeDLT `
            --icon app_icon.ico `
            --hidden-import yt_dlp `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import certifi `
            main.py

          move dist\YoutubeDLT.exe YoutubeDLT-Windows.exe

      - name: Upload Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: YoutubeDLT-Windows.exe
