name: Build Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

################################
# Windows
################################

  windows:

    runs-on: windows-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows
      run: |
        pyinstaller --noconfirm --clean --onefile --windowed ^
        --name YoutubeDLT ^
        --collect-all PyQt6 ^
        --hidden-import PyQt6.QtCore ^
        --hidden-import PyQt6.QtGui ^
        --hidden-import PyQt6.QtWidgets ^
        --hidden-import yt_dlp ^
        --hidden-import certifi ^
        main.py

    - name: Package
      run: |
        mkdir release
        move dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: windows
        files: release/YoutubeDLT-Windows.exe
        overwrite_files: true

################################
# macOS ARM (M1/M2/M3)
################################

  mac-arm:

    runs-on: macos-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        architecture: arm64

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build ARM
      run: |
        pyinstaller \
        --noconfirm \
        --clean \
        --windowed \
        --target-arch arm64 \
        --name YoutubeDLT \
        --collect-all PyQt6 \
        --hidden-import PyQt6.QtCore \
        --hidden-import PyQt6.QtGui \
        --hidden-import PyQt6.QtWidgets \
        --hidden-import yt_dlp \
        --hidden-import certifi \
        main.py

    - name: Fix macOS security
      run: |
        xattr -cr dist/YoutubeDLT.app
        codesign --deep --force --sign - dist/YoutubeDLT.app

    - name: Zip
      run: |
        cd dist
        zip -r YoutubeDLT-macOS-arm64.zip YoutubeDLT.app

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: mac-arm
        files: dist/YoutubeDLT-macOS-arm64.zip
        overwrite_files: true

################################
# macOS Intel
################################

  mac-intel:

    runs-on: macos-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        architecture: x64

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Intel
      run: |
        pyinstaller \
        --noconfirm \
        --clean \
        --windowed \
        --target-arch x86_64 \
        --name YoutubeDLT \
        --collect-all PyQt6 \
        --hidden-import PyQt6.QtCore \
        --hidden-import PyQt6.QtGui \
        --hidden-import PyQt6.QtWidgets \
        --hidden-import yt_dlp \
        --hidden-import certifi \
        main.py

    - name: Fix macOS security
      run: |
        xattr -cr dist/YoutubeDLT.app
        codesign --deep --force --sign - dist/YoutubeDLT.app

    - name: Zip
      run: |
        cd dist
        zip -r YoutubeDLT-macOS-x86_64.zip YoutubeDLT.app

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: mac-intel
        files: dist/YoutubeDLT-macOS-x86_64.zip
        overwrite_files: true
