name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

############################################
# Create Release
############################################

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true

############################################
# Windows Build
############################################

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Build Windows
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
          --name YoutubeDLT `
          --icon app_icon.ico `
          --hidden-import yt_dlp `
          --hidden-import PyQt6.QtWidgets `
          --hidden-import PyQt6.QtCore `
          --hidden-import PyQt6.QtGui `
          --hidden-import certifi `
          main.py

          mkdir release
          move dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe

      - name: Upload Windows
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-Windows.exe
          overwrite_files: true
          fail_on_unmatched_files: false

############################################
# macOS Build (Intel + Apple Silicon)
############################################

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build macOS
        run: |
          pyinstaller \
          --noconfirm \
          --clean \
          --windowed \
          --target-architecture ${{ matrix.arch }} \
          --name YoutubeDLT \
          --hidden-import yt_dlp \
          --hidden-import PyQt6.QtWidgets \
          --hidden-import PyQt6.QtCore \
          --hidden-import PyQt6.QtGui \
          --hidden-import certifi \
          main.py

      - name: Fix macOS Security
        run: |
          APP="dist/YoutubeDLT.app"

          # remove quarantine
          xattr -cr "$APP"

          # ad-hoc sign
          codesign --deep --force --sign - "$APP"

          # verify
          codesign --verify --deep --strict "$APP"

      - name: Package
        run: |
          mkdir release
          mv dist/YoutubeDLT.app release/

          cd release
          zip -r YoutubeDLT-macOS-${{ matrix.arch }}.zip YoutubeDLT.app

      - name: Upload macOS
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-macOS-${{ matrix.arch }}.zip
          overwrite_files: true
          fail_on_unmatched_files: false
