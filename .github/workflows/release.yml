name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true


  build:
    needs: create-release

    strategy:
      matrix:
        include:

          - os: windows-latest
            platform: windows

          - os: macos-latest
            platform: macos-arm64

          - os: macos-13
            platform: macos-x86_64

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v5


      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller


      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows'
        run: choco install ffmpeg -y


      - name: Install ffmpeg (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: brew install ffmpeg


      # Windows Build
      - name: Build Windows
        if: matrix.platform == 'windows'
        shell: powershell
        run: |

          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name YoutubeDLT `
            --icon app_icon.ico `
            --hidden-import yt_dlp `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import certifi `
            main.py

          mkdir release
          move dist\YoutubeDLT.exe release\YoutubeDLT-Windows.exe


      # macOS Build
      - name: Build macOS
        if: startsWith(matrix.platform, 'macos')
        run: |

          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import certifi \
            main.py

          mkdir release
          mv dist/YoutubeDLT.app release/

          cd release
          zip -r YoutubeDLT-${{ matrix.platform }}.zip YoutubeDLT.app


      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-Windows.exe


      - name: Upload macOS
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-${{ matrix.platform }}.zip
