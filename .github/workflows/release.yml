name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6  # Node 24 支持

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2.5.0  # 已 Node 24
        with:
          tag_name: ${{ github.ref_name }}
          name: "YoutubeDLT ${{ github.ref_name }}"
          body: |
            ## 🚀 YoutubeDLT ${{ github.ref_name }} Release

            下载对应平台的构建文件。

            ### 更新日志
            自动生成或手动补充
          generate_release_notes: true
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6  # Node 24 支持
        with:
          python-version: '3.12'  # 推荐 3.12
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup (for iscc on Windows)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --yes

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "YoutubeDLT" \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --add-data "app_icon.ico;." \
            main.py || echo "PyInstaller 失败，检查依赖"
          # 如果有 installer.iss，用 iscc；否则跳过或打包 zip
          if [ -f "installer.iss" ]; then
            iscc installer.iss || echo "iscc 失败"
          else
            cd dist
            7z a YoutubeDLT-Windows.zip YoutubeDLT || echo "无 7z，用 zip 代替"
          fi
          ls -la dist/  # debug: 查看生成的文件

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "YoutubeDLT" \
            --hidden-import yt_dlp \
            main.py
          cd dist
          zip -r YoutubeDLT-macOS.zip YoutubeDLT.app
          ls -la

      # 用新版 attest (v4+ 支持 Node 24)
      - name: Attest Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/attest@v4.1.0
        with:
          subject-path: 'dist/YoutubeDLT*'  # 匹配 exe 或 zip

      - name: Attest macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/attest@v4.1.0
        with:
          subject-path: 'dist/YoutubeDLT-macOS.zip'

      - name: Upload Windows Asset
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*Windows*.*  # 匹配 exe 或 zip

      - name: Upload macOS Asset
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/YoutubeDLT-macOS.zip
