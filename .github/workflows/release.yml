name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          body: |
            ## YoutubeDLT ${{ github.ref_name }}

            YouTube 下载工具桌面版  
            基于 **PyQt6 + yt-dlp**

            ### 下载
            Windows：YoutubeDLT-Windows.zip  
            macOS：YoutubeDLT-macOS.zip
          generate_release_notes: true
          draft: false
          prerelease: false


  build:

    needs: create-release

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller


      # 安装 ffmpeg
      - name: Install ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Install ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg


      # =========================
      # Windows build
      # =========================

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |

          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name "YoutubeDLT" `
            --icon app_icon.ico `
            --hidden-import yt_dlp `
            --hidden-import yt_dlp.utils `
            --hidden-import yt_dlp.extractor `
            --hidden-import yt_dlp.postprocessor `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import PyQt6.sip `
            --hidden-import certifi `
            main.py


          Compress-Archive `
            -Path "dist/YoutubeDLT" `
            -DestinationPath "dist/YoutubeDLT-Windows.zip" `
            -Force


      # =========================
      # macOS build
      # =========================

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |

          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name "YoutubeDLT" \
            --icon app_icon.ico \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import certifi \
            main.py

          cd dist
          zip -r YoutubeDLT-macOS.zip YoutubeDLT.app


      # =========================
      # 上传 Release
      # =========================

      - name: Upload Windows
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/YoutubeDLT-Windows.zip


      - name: Upload macOS
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/YoutubeDLT-macOS.zip
