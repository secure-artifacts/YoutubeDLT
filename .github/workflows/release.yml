jobs:

  build-macos:

    runs-on: macos-latest
    needs: create-release

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          brew install ffmpeg

      - name: Build arm64
        run: |
          arch -arm64 pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            main.py

          mv dist/YoutubeDLT.app YoutubeDLT-arm.app

      - name: Build x86_64
        run: |
          arch -x86_64 pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            main.py

          mv dist/YoutubeDLT.app YoutubeDLT-x86.app

      - name: Create Universal
        run: |

          cp -R YoutubeDLT-arm.app YoutubeDLT.app

          rm YoutubeDLT.app/Contents/MacOS/YoutubeDLT

          lipo -create \
            YoutubeDLT-arm.app/Contents/MacOS/YoutubeDLT \
            YoutubeDLT-x86.app/Contents/MacOS/YoutubeDLT \
            -output YoutubeDLT.app/Contents/MacOS/YoutubeDLT

          zip -r YoutubeDLT-macOS-universal.zip YoutubeDLT.app

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: YoutubeDLT-macOS-universal.zip
