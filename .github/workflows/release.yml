name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoutubeDLT ${{ github.ref_name }}
          generate_release_notes: true

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            arch: x64  # 不影響
          - os: macos-latest          # Apple Silicon (arm64)
            name: macOS-AppleSilicon
            arch: arm64
          - os: macos-26-large        # Intel (x86_64)，用 larger runner
            name: macOS-Intel
            arch: x86_64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg Windows
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Install ffmpeg macOS
        if: startsWith(matrix.os, 'macos-')
        run: brew install ffmpeg

      # Windows Build (不變)
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name YoutubeDLT `
            --icon app_icon.ico `
            --hidden-import yt_dlp `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import certifi `
            main.py

          mkdir release
          Move-Item -Path dist\YoutubeDLT.exe -Destination release\YoutubeDLT-Windows.exe

      # macOS Builds
      - name: Build macOS (${{ matrix.name }})
        if: startsWith(matrix.os, 'macos-')
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoutubeDLT \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import certifi \
            main.py

          mkdir release
          mv dist/YoutubeDLT.app release/

          cd release
          zip -r YoutubeDLT-${{ matrix.name }}.zip YoutubeDLT.app

      # Uploads
      - name: Upload Windows
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-Windows.exe

      - name: Upload macOS Apple Silicon
        if: matrix.name == 'macOS-AppleSilicon'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-macOS-AppleSilicon.zip

      - name: Upload macOS Intel
        if: matrix.name == 'macOS-Intel'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/YoutubeDLT-macOS-Intel.zip
