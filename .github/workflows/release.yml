name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: YoutubeDLT-Windows.exe
          - os: macos-latest
            artifact_name: YoutubeDLT-macOS.zip

    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Build Executable (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name YoutubeDLT `
            --icon app_icon.ico `
            --hidden-import yt_dlp `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import certifi `
            main.py

          mkdir dist_final
          Copy-Item dist\YoutubeDLT.exe dist_final\YoutubeDLT-Windows.exe

      - name: Build Executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --onedir \
            --windowed \
            --name YoutubeDLT \
            --target-arch universal2 \
            --hidden-import yt_dlp \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import certifi \
            main.py

          mkdir -p dist_final
          cd dist
          zip -r ../dist_final/YoutubeDLT-macOS.zip YoutubeDLT.app

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist_final/*'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist_final/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
