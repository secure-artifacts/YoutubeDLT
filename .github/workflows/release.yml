name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6   # 升级到 v6 (Node 24 支持)

      - name: Create or Update Release
        id: create_release
        uses: softprops/action-gh-release@v2.5.0   # 固定到最新兼容 Node 24 的版本
        with:
          tag_name: ${{ github.ref_name }}
          name: "GDriveSync ${{ github.ref_name }}"
          body: |
            ## 🚀 GDriveSync ${{ github.ref_name }}

            ### Windows 安装
            1. 下载 `GDriveSync-Windows-Setup.exe`
            2. 双击运行，按提示安装
            3. 首次运行点击「授权」完成 Google 登录

            ### macOS 安装
            1. 下载 `GDriveSync-macOS.zip`
            2. 解压后拖到「应用程序」文件夹
            3. 首次运行授权

            ### 更新内容
            （由 GitHub 自动生成或手动补充）

          generate_release_notes: true
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6   # 升级到 v6

      - name: Setup Python
        uses: actions/setup-python@v6   # 升级到 v6
        with:
          python-version: '3.12'   # 建议升级到 3.12，更稳定，yt-dlp 支持更好
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 只针对 Windows: 安装 Inno Setup（因为 iscc 默认不可用）
      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --yes

      - name: Build Windows (Installer)
        if: matrix.os == 'windows-latest'
        run: |
          # 如果你有 GDriveSync.spec，就用 pyinstaller GDriveSync.spec
          # 否则用命令行打包（推荐先这样测试）
          pyinstaller --noconfirm --onedir --windowed --name "GDriveSync" \
            --hidden-import=googleapiclient \
            --hidden-import=google_auth_oauthlib \
            --hidden-import=google.auth \
            --hidden-import=PyQt6 \
            --add-data "app_icon.ico;." \
            main.py
          # 假设 installer.iss 存在于仓库根目录
          iscc installer.iss || echo "Inno Setup 编译失败，请检查 installer.iss 文件"
          ls -la dist/   # 输出 dist 目录内容，便于 debug

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "GDriveSync" \
            --hidden-import "googleapiclient" \
            --collect-all "google_auth_oauthlib" \
            main.py
          cd dist
          zip -r GDriveSync-macOS.zip GDriveSync.app
          ls -la   # debug 输出

      - name: Attest Build Provenance (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/GDriveSync-Windows-Setup.exe'   # 假设 iss 输出这个 exe 名

      - name: Attest Build Provenance (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/GDriveSync-macOS.zip'

      - name: Upload Windows Asset
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/GDriveSync-Windows-Setup.exe   # 改成 iss 实际输出的 exe 名

      - name: Upload macOS Asset
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/GDriveSync-macOS.zip
